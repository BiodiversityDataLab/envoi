name: pre-commit autoupdate

on:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  autoupdate:
    runs-on: ubuntu-latest
    # peter-evans/create-pull-request needs these to push the branch and open
    # the PR with the default GITHUB_TOKEN. Without them the action pushes the
    # branch but silently fails to create the PR.
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pre-commit
        run: |
          python -m pip install -U pip
          pip install pre-commit

      - name: Run pre-commit autoupdate
        run: pre-commit autoupdate

      - name: Open PR if hooks changed
        uses: peter-evans/create-pull-request@v6
        with:
          title: "chore: pre-commit autoupdate"
          commit-message: "chore: pre-commit autoupdate"
          branch: pre-commit/autoupdate
          delete-branch: true
          body: |
            Weekly automated bump of pre-commit hook revisions via `pre-commit autoupdate`.
            Review the diff and merge if everything still passes CI.
