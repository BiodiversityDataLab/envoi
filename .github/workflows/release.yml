name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    # PyPI Trusted Publishing (OIDC) requires the workflow to be able to
    # request a short-lived id token from GitHub; without this permission
    # the pypa/gh-action-pypi-publish step fails with "OIDC token not found".
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install build twine

      - name: Build distribution
        run: python -m build

      - name: Check metadata
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
