name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    # PyPI Trusted Publishing (OIDC) requires id-token: write so the runner
    # can request a short-lived OIDC token from GitHub. Defining the
    # permissions block replaces the workflow defaults, so we must also
    # re-grant contents: read — without it actions/checkout fails with
    # "repository not found" on a private repo.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install build twine

      - name: Build distribution
        run: python -m build

      - name: Check metadata
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
