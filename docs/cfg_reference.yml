# ============================================================
# biodata-enricher: cfg reference
# ============================================================
# Pass as a dict (single output) or list of dicts (multiple)
# to enrich(df, cfg, catalog=..., out_dir=...)
# ============================================================

# --- Single output example ---

name: terrain                   # Output name. Used for filenames (e.g. terrain.parquet)
                                # Default: "output1", "output2", ...

predictors:                     # List of dataset names from catalog.yml
  - dem_aster
  - bioclim

output:
  kind: tabular                 # "tabular" or "raster"

  # --- Tabular options ---
  reducers:                     # Statistics to compute per point
    - mean                      # Available: mean, median, min, max, sum, std, var, count
    - std                       #            q05, q10, q25, q50, q75, q90, q95
    - q10                       #            point (samples exact pixel, no window)
    - q90
  window_m: 200                 # Side length of square window in metres. Default: 500
  format: parquet               # "parquet" (default) or "csv"
  min_coverage_pct: 80          # QC threshold for low-coverage warning. Default: 80

  --- Raster options ---
  kind: raster
  window_m: 200               # Crop window in metres
  resample_m: 50              # Resample all tiles to this resolution (metres).
                                Output will be round(window_m / resample_m) x round(window_m / resample_m) pixels.
                                Omit to keep native resolution.


--- Multiple outputs example ---
Pass a list:

enrich(df, [
    {
        "name": "terrain_stats",
        "predictors": ["dem_aster"],
        "output": {"kind": "tabular", "reducers": ["mean", "std"], "window_m": 200},
    },
    {
        "name": "terrain_tiles",
        "predictors": ["dem_aster"],
        "output": {"kind": "raster", "window_m": 200, "resample_m": 10},
    },
])


============================================================
Catalog options (catalog.yml)
============================================================
Each dataset in the catalog requires source + path.
Everything else is auto-detected or optional.

datasets:
  dem_aster:
    source: earth_engine                # "earth_engine" or "local"
    path: projects/sat-io/open-datasets/ASTER/GDEM  # GEE asset ID or local file path
    data_type: continuous               # "continuous" or "categorical"
                                        # Affects default reducer (mean vs point) and
                                        # warns if inappropriate reducers are requested.
    band: 1                             # Optional: select specific band (name or index)

    # --- Optional: GEE feature_spec ---
    feature_spec:
      cloud_pct_max: 20                 # Filter scenes by CLOUDY_PIXEL_PERCENTAGE
      cloud_mask: s2                    # Apply cloud mask function ("s2" for Sentinel-2)
      derived_band: NDVI                # Compute derived band: NDVI, EVI, slope, aspect

    # Date handling for ImageCollections is automatic:
    # - If the input DataFrame has a 'date' column, the nearest image to
    #   each point's date is selected. Out-of-range dates are clamped to
    #   the closest available image.
    # - If no 'date' column is provided, the most recent image is used.

  dem_local:
    source: local
    path: data/dem/my_dem.tif
    band: 1                             # Optional, defaults to band 1
    # CRS, resolution, nodata are auto-detected from the file


============================================================
Input DataFrame requirements
============================================================
Required columns: id, lat, lon
Optional column:  date (used for temporal filtering on GEE collections)

df = pd.DataFrame({
    "id":   ["A", "B", "C"],
    "lat":  [62.97, 62.98, 63.01],
    "lon":  [18.02, 18.03, 18.05],
    "date": ["2020-06-01", "2020-06-01", "2020-07-15"],  # optional
})


============================================================
Output files
============================================================
Tabular:
  out/{name}.parquet          Stats (e.g. dem_aster_mean_b200)
  out/{name}_qc.parquet       QC flags (in_extent, n_pixels, had_nodata, coverage_pct)
  out/{name}_metadata.json    Sidecar metadata

Raster:
  out/{name}/{predictor}/A-{predictor}.tif    One GeoTIFF per point
  out/{name}/{name}_metadata.json             Sidecar metadata
