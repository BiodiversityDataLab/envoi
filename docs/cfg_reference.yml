# ============================================================
# envoi: config reference
# ============================================================
# Pass as a dict (single output) or list of dicts (multiple)
# to extract(df, config, catalog=..., output_dir=...)
# ============================================================

# --- Single output example ---

batch_id: terrain                 # Batch identifier. Used for filenames (e.g. terrain.parquet)
                                # Default: "output1", "output2", ...

datasets:                       # List of dataset names from catalog.yml
  - dem_copernicus_glo30
  - climate_bioclim

settings:
  output_type: tabular          # "tabular" or "raster"

  # --- Tabular options ---
  statistics:                   # Statistics to compute per point
    - mean                      # Available: mean, median, min, max, sum, std, var, count
    - std                       #            q05, q10, q25, q50, q75, q90, q95
    - q10                       #            point (samples exact pixel, no window)
    - q90
  window_size_m: 200            # Side length of square window in metres. Default: 500
  output_file_format: parquet        # "parquet" (default) or "csv"
  min_coverage_pct: 80          # QC threshold for low-coverage warning. Default: 80

  --- Raster options ---
  output_type: raster
  window_size_m: 200            # Crop window in metres
  resample_m: 50                # Resample all tiles to this resolution (metres).
                                  Output will be round(window_size_m / resample_m) x round(window_size_m / resample_m) pixels.
                                  Omit to keep native resolution.


--- Multiple outputs example ---
Pass a list:

extract(df, [
    {
        "batch_id": "terrain_stats",
        "datasets": ["dem_copernicus_glo30"],
        "settings": {"output_type": "tabular", "statistics": ["mean", "std"], "window_size_m": 200},
    },
    {
        "batch_id": "terrain_tiles",
        "datasets": ["dem_copernicus_glo30"],
        "settings": {"output_type": "raster", "window_size_m": 200, "resample_m": 10},
    },
])


============================================================
Catalog options (catalog.yml)
============================================================
Each dataset in the catalog requires source + path.
Everything else is auto-detected or optional.

datasets:
  dem_copernicus_glo30:
    data_source: earth_engine                # "earth_engine" or "local"
    path: COPERNICUS/DEM/GLO30                # GEE asset ID or local file path
    data_type: continuous               # "continuous" or "categorical"
                                        # Affects default reducer (mean vs point) and
                                        # warns if inappropriate reducers are requested.
    bands: 1                            # Optional: select specific band (name or index)

    # --- Optional: GEE dataset_spec ---
    dataset_spec:
      cloud_pct_max: 20                 # Filter scenes by CLOUDY_PIXEL_PERCENTAGE
      cloud_mask: s2                    # Apply cloud mask function ("s2" for Sentinel-2)
      derived_bands: NDVI                # Compute derived band: NDVI, EVI, slope, aspect

    # Date handling for ImageCollections is automatic:
    # - If the input DataFrame has a 'date' column, the nearest image to
    #   each point's date is selected. Out-of-range dates are clamped to
    #   the closest available image.
    # - If no 'date' column is provided, the most recent image is used.

  dem_local:
    data_source: local
    path: data/dem/my_dem.tif
    bands: 1                            # Optional, defaults to band 1
    # CRS, resolution, nodata are auto-detected from the file


============================================================
Input DataFrame requirements
============================================================
Required columns: id, lat, lon
Optional column:  date (used for temporal filtering on GEE collections)

df = pd.DataFrame({
    "id":   ["A", "B", "C"],
    "lat":  [62.97, 62.98, 63.01],
    "lon":  [18.02, 18.03, 18.05],
    "date": ["2020-06-01", "2020-06-01", "2020-07-15"],  # optional
})


============================================================
Output files
============================================================
Tabular:
  out/{batch_id}.parquet          Stats (e.g. dem_copernicus_glo30_mean_b200)
  out/{batch_id}_qc.parquet       QC flags (in_extent, n_pixels, had_nodata, coverage_pct)
  out/{batch_id}_metadata.json    Sidecar metadata

Raster:
  out/{batch_id}/{dataset}/A-{dataset}.tif      One GeoTIFF per point
  out/{batch_id}/{batch_id}_metadata.json         Sidecar metadata
