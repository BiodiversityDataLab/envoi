groups:
  - name: site_stats
    predictors: [dem_elev, slope]
    output:
      kind: tabular
      window_m: 500
      reducers: [mean, std]
      dump_windows: true      # <— write per-point GeoTIFF windows for each predictor

  - name: landcover_summary
    predictors: [lc_majority]
    output:
      kind: tabular
      window_m: 1000
      reducers: [count]
      dump_windows: false     # <— off (or omit)

  - name: viz_tiles
    predictors: [dem_elev]
    output:
      kind: raster
      window_m: 0
      # dump_windows has no effect in raster demo mode
