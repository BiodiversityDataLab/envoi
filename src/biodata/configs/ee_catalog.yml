datasets:

  # ── Example / reference entry ────────────────────────────────────────────
  # Copy this block when adding a real dataset.
  # All fields except source, path and data_type are optional.
  dataset_name:  # provide a unique name for this dataset e.g. "sentinel_2_l2a"
    data_source: earth_engine
    path: path/to/dataset_on_earth_engine   # GEE asset ID; type (IMAGE / IMAGE_COLLECTION) is auto-detected
    data_type: type                 # "continuous" or "categorical"

    # Band selection - if omitted, all bands are loaded.
    # The values set here are the dataset-wide DEFAULT and apply to every
    # call to extract() that doesn't override them.
    bands: [list, of, bands]                 # single string ("DEM") or list (["B4", "B8"])
    derived_bands: [slope, aspect]           # compute and include derived bands (currently supported: slope, aspect — DEM-style datasets)
    #
    # The user can also override the bands list on a per-call basis by
    # inlining a single-key dict in the `datasets` list passed to extract():
    #   datasets:
    #     - sentinel_2_l2a                       # use the catalog defaults
    #     - {sentinel_2_l2a: [B4, B8]}           # shorthand: replace bands for this run only
    #     - {dem_aster:     [DEM, slope]}        # mix source + derived names in one list
    # Names recognised as derived (currently "slope", "aspect") are split out
    # internally; the rest are used as source bands. The per-call override
    # replaces the catalog's bands list entirely (no merging).

    dataset_spec:
      # Dataset-specific options
      native_scale_m: 10            # native spatial resolution in meters (only needed for datasets that lack a native scale property in GEE metadata, e.g. composites stored in EPSG:4326)
      use_utm_zone: true # true/false. for tiled collections, filter to the UTM zone of the point to avoid selecting the wrong tile.
      collection_date_policy: contains # for interval-based collections (e.g. monthly aggregates), use the image whose time range satisfies start <= date < end, instead of nearest start date.

    dataset_information:
      # Optional free-form metadata fields, written to metadata JSON.
      # These are not used by EDDP itself, but can be useful for users.
      description: "A brief description of the dataset."
      ee_source_url: "https://developers.google.com/earth-engine/datasets/catalog/path_to_dataset"
      source_url: "https://example.com/dataset-info"
      citation: "Author et al. (Year). Title. Journal. DOI."
      license: "CC-BY-4.0"
  # ─────────────────────────────────────────────────────────────────────────
  
  
  dem_aster: # testing purpose only - remove later
    data_source: earth_engine
    path: projects/sat-io/open-datasets/ASTER/GDEM
    data_type: continuous


  dem_glo30:
    data_source: earth_engine
    path: COPERNICUS/DEM/GLO30
    data_type: continuous
    bands: [DEM]
    dataset_information:
      description: "Copernicus DEM GLO-30 - global 30m digital surface model derived from TanDEM-X radar data."
      ee_source_url: "https://developers.google.com/earth-engine/datasets/catalog/COPERNICUS_DEM_GLO30"
      source_url: "https://dataspace.copernicus.eu/sites/default/files/media/files/2024-06/geo1988-copernicusdem-spe-002_producthandbook_i5.0.pdf"
      citation: "© DLR e.V. 2010-2014 and © Airbus Defence and Space GmbH 2014-2018 provided under COPERNICUS by the European Union and ESA; all rights reserved."
      license: "Copernicus Data License (free for most uses)"

  bioclim:
    data_source: earth_engine
    path: WORLDCLIM/V1/BIO
    data_type: continuous
    dataset_information:
      description: "WorldClim v1 bioclimatic variables - 19 variables derived from temperature and precipitation, approx. 1km resolution."
      ee_source_url: "https://developers.google.com/earth-engine/datasets/catalog/WORLDCLIM_V1_BIO"
      source_url: "https://www.worldclim.org/data/bioclim.html"
      citation: "Hijmans, R.J., Cameron, S.E., Parra, J.L., Jones, P.G., & Jarvis, A. (2005). Very high resolution interpolated climate surfaces for global land areas. International Journal of Climatology, 25, 1965-1978."
      license: "CC-BY-SA-4.0"

  era5_monthly:
    data_source: earth_engine
    path: ECMWF/ERA5/MONTHLY
    data_type: continuous
    dataset_spec:
      collection_date_policy: contains # for collections with multiple images per date, e.g. monthly aggregates, use the image that contains the date rather than the one closest to it.
    dataset_information:
      description: "ERA5 monthly aggregates - global climate reanalysis from ECMWF covering 1979-present, approx. 27.8km resolution."
      ee_source_url: "https://developers.google.com/earth-engine/datasets/catalog/ECMWF_ERA5_MONTHLY"
      source_url: "https://www.ecmwf.int/en/forecasts/dataset/ecmwf-reanalysis-v5"
      citation: "Copernicus Climate Change Service (C3S) (2017): ERA5: Fifth generation of ECMWF atmospheric reanalyses of the global climate. Copernicus Climate Change Service Climate Data Store (CDS), (date of access), https://cds.climate.copernicus.eu/cdsapp#!/home"
      license: "Copernicus C3S/CAMS License"

  satellite_embeddings:
    data_source: earth_engine
    path: GOOGLE/SATELLITE_EMBEDDING/V1/ANNUAL
    data_type: continuous
    dataset_spec:
      use_utm_zone: true # Some tiled collections need UTM-zone filtering to avoid selecting the wrong tile for a point.
      collection_date_policy: contains
    dataset_information:
      description: "Google Satellite Embeddings V1 - annual 64-dimensional embeddings for 2017-2025, 10m resolution."
      ee_source_url: "https://developers.google.com/earth-engine/datasets/catalog/GOOGLE_SATELLITE_EMBEDDING_V1_ANNUAL"
      source_url: "http://arxiv.org/abs/2507.22291"
      citation: "Brown, C. F., Kazmierski, M. R., Pasquarella, V J., Rucklidge, W. J., Samsikova, M., Zhang, C., Shelhamer, E., Lahera, E., Wiles, O., Ilyushchenko, S., Gorelick, N., Zhang, L. L., Alj, S., Schechter, E., Askay, S., Guinan, O., Moore, R., Boukouvalas, A., & Kohli, P.(2025). AlphaEarth Foundations: An embedding field model for accurate and efficient global mapping from sparse label data. arXiv preprint arXiv.2507.22291. "
      license: "CC-BY-4.0"

  human_impact_index:
    data_source: earth_engine
    path: projects/HII/v1/hii
    data_type: continuous
    dataset_information:
      description: "Human Impact Index (HII) - cumulative measure of human influence on terrestrial ecosystems."
      ee_source_url: "https://code.earthengine.google.com/f904097220e577cad2e0dc5379371c91"
      source_url: "https://wcshumanfootprint.org/"
      citation: "Sanderson, E. W., Fisher, K., Robinson, N., Sampson, D., Duncan, A., & Royte, L. (2022). The march of the human footprint."
      license: "CC BY-NC-SA-3.0"

  human_impact_index_drivers: # not working atm
    data_source: earth_engine
    path: projects/HII/v1/driver/infrastructure
    data_type: continuous
    dataset_information:
      description: "Human Impact Index - driver layers for HII (roads, railways, water etc.)."
      ee_source_url: "https://code.earthengine.google.com/f904097220e577cad2e0dc5379371c91"
      source_url: "https://wcshumanfootprint.org/"
      citation: "Sanderson, E. W., Fisher, K., Robinson, N., Sampson, D., Duncan, A., & Royte, L. (2022). The march of the human footprint."
      license: "CC BY-NC-SA-3.0"

  lulc_esa_worldcover_2021:
    data_source: earth_engine
    path: ESA/WorldCover/v200
    data_type: categorical
    dataset_information:
      description: "ESA WorldCover 2021 - global 10m land use / land cover map with 11 classes."
      ee_source_url: "https://developers.google.com/earth-engine/datasets/catalog/ESA_WorldCover_v200"
      source_url: "https://esa-worldcover.org"
      citation: "Zanaga, D., Van De Kerchove, R., Daems, D., De Keersmaecker, W., Brockmann, C., Kirches, G., Wevers, J., Cartus, O., Santoro, M., Fritz, S., Lesiv, M., Herold, M., Tsendbazar, N.E., Xu, P., Ramoino, F., Arino, O., 2022. ESA WorldCover 10 m 2021 v200."
      license: "CC-BY-4.0"

  lulc_cgls_lc100: # not working atm
    data_source: earth_engine
    path: COPERNICUS/Landcover/100m/Proba-V-C3/Global
    data_type: categorical
    dataset_information:
      description: "Copernicus Global Land Service Land Cover 100m - annual global land cover maps at 100m resolution."
      ee_source_url: "https://developers.google.com/earth-engine/datasets/catalog/COPERNICUS_Landcover_100m_Proba-V-C3_Global"
      source_url: "https://land.copernicus.eu/global/products/lc"
      citation: "Buchhorn, M., Smets, B., Bertels, L., Roo, B. D., Lesiv, M., Tsendbazar, N.-E., Herold, M., & Fritz, S. (2020). Copernicus Global Land Service: Land Cover 100m: collection 3: epoch 2019: Globe (Version V3.0.1) [Data set]. Zenodo."
      license: "Fully free and open to all users"

  landsat_annual_ndvi:
    data_source: earth_engine
    path: LANDSAT/COMPOSITES/C02/T1_L2_ANNUAL_NDVI
    data_type: continuous
    dataset_spec:
      native_scale_m: 30
      collection_date_policy: contains
    dataset_information:
      description: "Landsat Annual NDVI - global annual composites of NDVI from 1984-present, 30m resolution."
      ee_source_url: "https://developers.google.com/earth-engine/datasets/catalog/LANDSAT_COMPOSITES_C02_T1_L2_ANNUAL_NDVI"
      source_url: "https://www.usgs.gov/landsat-missions/landsat-surface-reflectance-derived-spectral-indices"
      citation: "Landsat NDVI products courtesy of the U.S. Geological Survey Earth Resources Observation and Science Center."
      license: "Public Domain (free for all uses)"

