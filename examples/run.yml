# envoi: example run configuration (template)
#
# Pass to extract: `extract(points, "examples/run.yml")`.
# Each top-level item is a batch — one batch produces one output file
# (or one folder of raster tiles) under outputs/.
# All datasets referenced below ship in the built-in catalog, so no
# update_catalog() call is needed to run this example.

# Tabular statistics inside a 200 m window around each point.
- batch_id: terrain_stats
  datasets: [dem_copernicus_glo30]
  settings:
    output_type: tabular                # "tabular" or "raster"
    statistics: [mean, std, q10, q90]   # any reducer from envoi.list_reducers()
    window_size_m: 200                  # side length of the square window in metres
    output_file_format: csv             # "csv", "parquet", or "dataframe"

# One GeoTIFF tile per point, resampled to 10 m/pixel in the point's UTM zone.
- batch_id: terrain_tiles
  datasets: [dem_copernicus_glo30]
  settings:
    output_type: raster
    window_size_m: 200
    resample_m: 10                      # omit to keep the source raster's native resolution

# Mixed continuous + categorical — separate reducers per data_type.
- batch_id: terrain_and_landcover
  datasets: [dem_copernicus_glo30, lulc_worldcover_2021]
  settings:
    output_type: tabular
    window_size_m: 500
    statistics:
      continuous:  [mean, std]
      categorical: [mode, class_fraction]
