# envoi: example custom catalog (template)
#
# Register with `update_catalog("examples/catalog.yml")` before calling
# extract(). Entries registered here override built-ins with the same name.
#
# Required keys: data_source, path (and data_type for earth_engine entries).
# Full schema reference: src/envoi/configs/ee_catalog.yml.

datasets:

  # Local GeoTIFF — CRS, pixel size, nodata and band count are auto-detected.
  my_dem:
    data_source: local
    path: data/my_dem.tif

  # Local categorical raster — bands are addressed by integer index
  # (1-based, rasterio style). data_type must be set explicitly; local
  # entries default to "continuous" otherwise.
  my_landcover:
    data_source: local
    path: data/landcover.tif
    data_type: categorical
    bands: 1
    dataset_information:
      description: "Local 10 m land cover raster, classes 1-9."
      citation: "Smith et al. 2024"
      license: "internal"

  # Earth Engine asset not in the built-in catalog.
  sentinel_2_sr_harmonized:
    data_source: earth_engine
    path: COPERNICUS/S2_SR_HARMONIZED
    data_type: continuous
    bands: [B4, B8]
    dataset_spec:
      # Interval-based collection: pick the image whose time range contains
      # the point's date, rather than the nearest start timestamp.
      collection_date_policy: contains
